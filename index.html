// ── helpers ───────────────────────────────────────────────────────────────

const todayStr = () =>

const fmtTime = (s) => `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, "0")}`;
const fmtSize = (b) => b < 1048576 ? `${(b / 1024).toFixed(0)} KB` : `${(b / 1048576).toFixed(1)} MB`;

function extractJSON(raw) {
  try { return JSON.parse(raw.trim()); } catch {}
  const s = raw.replace(/```json/gi, "").replace(/```/g, "").trim();
  try { return JSON.parse(s); } catch {}
  const start = s.indexOf("{");
  if (start === -1) throw new Error("JSON не найден в ответе модели");
  let depth = 0;
  for (let i = start; i < s.length; i++) {
    if (s[i] === "{") depth++;
    else if (s[i] === "}") { depth--; if (depth === 0) return JSON.parse(s.slice(start, i + 1)); }
  }
  throw new Error("Незакрытый JSON");
}

function copyToClipboard(text) {
  return new Promise((resolve, reject) => {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(resolve).catch(fb);
    } else fb();
    function fb() {
      try {
        const ta = Object.assign(document.createElement("textarea"), { value: text });
        ta.style.cssText = "position:fixed;top:0;left:0;opacity:0;pointer-events:none";
        document.body.appendChild(ta); ta.focus(); ta.select();
        document.execCommand("copy"); document.body.removeChild(ta); resolve();
      } catch (e) { reject(e); }
    }
  });
}

</head><body>

${r.language_notes ? `<h2>Примечание о языке</h2><p>${r.language_notes}</p>` : ""}

  const blob = new Blob(["\ufeff" + html], { type: "application/msword;charset=utf-8" });

    <div style="margin-bottom:10px"><div style="font-size:9pt;color:#1a6b8a;text-transform:uppercase;font-weight:bold;border-bottom:1px solid #cde;padding-bottom:2px;margin-bottom:5px">Рекомендации</div><ul style="margin:4px 0;padding-left:20px">${recs}</ul></div>
    ${r.language_notes ? `<div style="margin-bottom:10px"><div style="font-size:9pt;color:#1a6b8a;text-transform:uppercase;font-weight:bold;border-bottom:1px solid #cde;padding-bottom:2px;margin-bottom:5px">Примечание о языке</div><p style="margin:0">${r.language_notes}</p></div>` : ""}
    <div style="margin-top:24px;padding-top:7px;border-top:1px solid #ddd;font-size:8pt;color:#aaa;font-style:italic">Сформировано автоматически · MedScribe AI · Требует верификации врача</div>
  </div>`;
  document.body.appendChild(w);
  setTimeout(() => { window.print(); setTimeout(() => { w.remove(); st.remove(); }, 1500); }, 250);
}

// ── main ──────────────────────────────────────────────────────────────────

function MedScribeAI() {
  const [tab, setTab] = useState("audio");
  const [audioMode, setAudioMode] = useState("mic"); // "mic" | "file"

  // shared
  const [transcript, setTranscript] = useState("");
  const [inputText, setInputText] = useState("");

  // mic recording
  const [isRecording, setIsRecording] = useState(false);
  const [recSeconds, setRecSeconds] = useState(0);
  const [recLang, setRecLang] = useState("ru-RU");
  const [interimText, setInterimText] = useState("");
  const [speechError, setSpeechError] = useState("");
  const [speechSupported, setSpeechSupported] = useState(true);

  // file upload
  const [uploadFile, setUploadFile] = useState(null);
  const [uploadAudioUrl, setUploadAudioUrl] = useState(null);
  const [uploadDuration, setUploadDuration] = useState(null);
  const [aaiKey, setAaiKey] = useState("");
  const [transcribing, setTranscribing] = useState(false);
  const [transcribeStep, setTranscribeStep] = useState("");
  const [transcribeError, setTranscribeError] = useState("");

  // analysis
  const [result, setResult] = useState(null);
  const [rawResponse, setRawResponse] = useState("");
  const [analyzing, setAnalyzing] = useState(false);
  const [analyzeError, setAnalyzeError] = useState("");

  // downloads
  const [dlWord, setDlWord] = useState(false);
  const [dlPdf, setDlPdf] = useState(false);
  const [copied, setCopied] = useState(false);
  const [copyError, setCopyError] = useState("");

  const recognitionRef = useRef(null);
  const timerRef = useRef(null);
  const isRecordingRef = useRef(false);
  const accumulatedRef = useRef("");
  const textareaRef = useRef(null);
  const fileInputRef = useRef(null);

  useEffect(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) setSpeechSupported(false);
    return () => doStopRec();
  }, []);
  useEffect(() => { isRecordingRef.current = isRecording; }, [isRecording]);

  // ── mic ──

  const doStopRec = () => {
    isRecordingRef.current = false;
    setIsRecording(false); setInterimText("");
    if (recognitionRef.current) { try { recognitionRef.current.stop(); } catch {} recognitionRef.current = null; }
    if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
  };

  const startRec = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setSpeechError("Браузер не поддерживает запись. Используйте Google Chrome."); return; }
    setSpeechError(""); setInterimText("");
    accumulatedRef.current = transcript ? transcript + " " : "";
    const r = new SR();
    r.continuous = true; r.interimResults = true; r.lang = recLang; r.maxAlternatives = 1;
    recognitionRef.current = r;
    r.onresult = (e) => {
      let interim = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) { accumulatedRef.current += t.trim() + " "; const c = accumulatedRef.current.trim(); setTranscript(c); setInputText(c); }
        else { interim = t; }
      }
      setInterimText(interim);
    };
    r.onerror = (e) => {
      if (e.error === "no-speech") return;
      if (e.error === "not-allowed" || e.error === "service-not-allowed") { setSpeechError("Доступ к микрофону запрещён. Разрешите в настройках браузера."); doStopRec(); return; }
      if (e.error === "network") { setSpeechError("Ошибка сети. Web Speech API требует подключения к интернету."); doStopRec(); return; }
      setSpeechError("Ошибка: " + e.error);
    };
    r.onend = () => { if (isRecordingRef.current && recognitionRef.current) { try { recognitionRef.current.start(); } catch {} } };
    try {
      r.start(); setIsRecording(true); setRecSeconds(0);
      timerRef.current = setInterval(() => setRecSeconds(s => s + 1), 1000);
    } catch (e) { setSpeechError("Не удалось запустить: " + e.message); }
  };

  // ── file upload + AssemblyAI ──

  const loadFile = (f) => {
    if (!f) return;
    setUploadFile(f); setTranscribeError(""); setTranscript(""); setInputText("");
    const url = URL.createObjectURL(f); setUploadAudioUrl(url);
    const a = new Audio(url); a.onloadedmetadata = () => setUploadDuration(a.duration);
  };

  const transcribeFile = async () => {
    if (!uploadFile) return;
    if (!aaiKey.trim()) { setTranscribeError("Введите AssemblyAI API ключ"); return; }
    setTranscribing(true); setTranscribeError(""); setTranscribeStep("Загружаю файл…");
    try {
      // Step 1: upload audio
      const upRes = await fetch("https://api.assemblyai.com/v2/upload", {
        method: "POST",
        headers: { authorization: aaiKey.trim(), "Content-Type": "application/octet-stream" },
        body: uploadFile,
      });
      if (!upRes.ok) { const e = await upRes.json(); throw new Error(e.error || `Upload ${upRes.status}`); }
      const { upload_url } = await upRes.json();

      // Step 2: submit transcription (Russian handles mixed kk+ru well)
      setTranscribeStep("Запускаю распознавание…");
      const subRes = await fetch("https://api.assemblyai.com/v2/transcript", {
        method: "POST",
        headers: { authorization: aaiKey.trim(), "Content-Type": "application/json" },
        body: JSON.stringify({ audio_url: upload_url, language_code: "ru", punctuate: true, format_text: true }),
      });
      if (!subRes.ok) { const e = await subRes.json(); throw new Error(e.error || `Submit ${subRes.status}`); }
      const { id } = await subRes.json();

      // Step 3: poll for result
      setTranscribeStep("Распознаю речь…");
      let text = "";
      for (let i = 0; i < 120; i++) {
        await new Promise(res => setTimeout(res, 2500));
        const poll = await fetch(`https://api.assemblyai.com/v2/transcript/${id}`, {
          headers: { authorization: aaiKey.trim() },
        });
        const data = await poll.json();
        if (data.status === "completed") { text = data.text || ""; break; }
        if (data.status === "error") throw new Error("Ошибка AssemblyAI: " + data.error);
        setTranscribeStep(`Распознаю… (${Math.round((i + 1) * 2.5)}с)`);
      }
      if (!text) throw new Error("Превышено время ожидания");
      setTranscript(text); setInputText(text);
      setTranscribeStep("✓ Готово!");
      setTimeout(() => setTranscribeStep(""), 2500);
    } catch (e) { setTranscribeError(e.message); }
    finally { setTranscribing(false); }
  };

  // ── Claude ──

  const analyze = async (override) => {
    const txt = (override !== undefined ? override : inputText).trim();
    if (!txt) return;
    setAnalyzing(true); setAnalyzeError(""); setResult(null); setRawResponse("");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({ model: "claude-haiku-4-5-20251001", max_tokens: 1500, system: CLAUDE_SYSTEM, messages: [{ role: "user", content: txt }] }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data?.error?.message || `HTTP ${res.status}`);
      const raw = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
      setRawResponse(raw);
      if (!raw) throw new Error("Пустой ответ от модели");
      setResult(extractJSON(raw));
      setTab("result");
    } catch (e) { setAnalyzeError(e.message || "Неизвестная ошибка"); }
    finally { setAnalyzing(false); }
  };

  const handleCopy = async () => {
    if (!result) return; setCopyError("");
    const recs = Array.isArray(result.recommendations) ? result.recommendations.map((r, i) => `${i + 1}. ${r}`).join("\n") : String(result.recommendations || "");
    const text = [`ПРОТОКОЛ МЕДИЦИНСКОГО ПРИЁМА\nДата: ${todayStr()}`, `ДИАГНОЗ\n${result.diagnosis}`, `ЖАЛОБЫ\n${result.patient_complaints}`, `АНАМНЕЗ\n${result.anamnesis}`, `ДАННЫЕ ОСМОТРА\n${result.examination_data}`, `РЕКОМЕНДАЦИИ\n${recs}`, `ПЛАН ЛЕЧЕНИЯ\n${result.treatment_plan}`, `ПРОГНОЗ\n${result.prognosis}`, `НАБЛЮДЕНИЕ\n${result.follow_up}`].join("\n\n");
    try { await copyToClipboard(text); setCopied(true); setTimeout(() => setCopied(false), 2500); }
    catch { setCopyError("Не удалось скопировать автоматически — нажмите на текст ниже."); }
  };

  // ── button styles ──

  const btnPrimary = (on) => ({
    display: "flex", alignItems: "center", justifyContent: "center", gap: 10,
    padding: "14px 28px", borderRadius: 11, fontSize: 14, fontWeight: 700, letterSpacing: ".07em",
    cursor: on ? "pointer" : "not-allowed", transition: "all .2s",
    border: "1px solid " + (on ? "#2a9fd6" : "#182840"),
    background: on ? "linear-gradient(135deg,#1a6b8a,#0e4a6e)" : "#0b1422",
    color: on ? "#e0f0fc" : "#203040",
    boxShadow: on ? "0 0 22px rgba(26,107,138,.25)" : "none",
  });
  const btnGreen = (on) => ({
    display: "flex", alignItems: "center", justifyContent: "center", gap: 10,
    padding: "14px 28px", borderRadius: 11, fontSize: 14, fontWeight: 700, letterSpacing: ".07em",
    cursor: on ? "pointer" : "not-allowed", transition: "all .2s",
    border: "1px solid " + (on ? "rgba(42,180,80,.45)" : "#182840"),
    background: on ? "linear-gradient(135deg,#1a5a3a,#0e3824)" : "#0b1422",
    color: on ? "#5ad880" : "#203040",
    boxShadow: on ? "0 0 20px rgba(42,180,80,.17)" : "none",
  });

  const TABS = [{ id: "audio", label: "🎙 Аудио" }, { id: "text", label: "📝 Текст" }, { id: "result", label: "📋 Протокол" }];

  return (
    <div style={{ minHeight: "100vh", background: "#07101e", fontFamily: "'Georgia',serif", color: "#e0eaf5" }}>

      <header style={{ borderBottom: "1px solid #182840", padding: "17px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", background: "linear-gradient(180deg,#0b1a2e,#07101e)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 13 }}>
          <div style={{ width: 40, height: 40, background: "linear-gradient(135deg,#1a6b8a,#0e3d5c)", borderRadius: 9, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 19, boxShadow: "0 0 16px rgba(26,107,138,.5)" }}>⚕</div>
          <div>
            <div style={{ fontSize: 17, fontWeight: 700, color: "#b8d8f0" }}>MedScribe <span style={{ color: "#2a9fd6", fontStyle: "italic" }}>AI</span></div>
            <div style={{ fontSize: 10, color: "#2a4060", letterSpacing: ".12em", textTransform: "uppercase" }}>Қазақша · Русский · Mixed</div>
          </div>
        </div>
